---
- name: Check Homebrew is installed
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: homebrew_check

- name: Install Homebrew
  ansible.builtin.shell: |
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: not homebrew_check.stat.exists
  changed_when: true

- name: Add Homebrew taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ homebrew_taps }}"

- name: Install Homebrew packages
  community.general.homebrew:
    name: "{{ homebrew_packages }}"
    state: present
    update_homebrew: true

- name: Build OpenJDK package list for this Mac
  ansible.builtin.set_fact:
    homebrew_java_packages_for_host: >-
      {{
        homebrew_java_packages
        if ansible_architecture == 'x86_64'
        else homebrew_java_packages | reject('equalto', 'openjdk@8') | list
      }}

- name: Install OpenJDK packages
  community.general.homebrew:
    name: "{{ homebrew_java_packages_for_host }}"
    state: present
    update_homebrew: true
  when: homebrew_java_packages_for_host | length > 0

- name: Install Homebrew casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  loop: "{{ homebrew_casks }}"
  ignore_errors: true

- name: Get Homebrew prefix
  ansible.builtin.command: brew --prefix
  register: homebrew_prefix
  changed_when: false

- name: Add OpenJDK versions to jenv
  ansible.builtin.command: >
    jenv add {{ homebrew_prefix.stdout }}/opt/{{ item }}/libexec/openjdk.jdk/Contents/Home
  loop: "{{ homebrew_java_packages_for_host }}"
  register: homebrew_jenv_add_result
  changed_when: >
    'added' in homebrew_jenv_add_result.stdout
    or 'added' in homebrew_jenv_add_result.stderr
  failed_when: >
    homebrew_jenv_add_result.rc != 0
    and 'already' not in homebrew_jenv_add_result.stdout
    and 'already' not in homebrew_jenv_add_result.stderr
  when: homebrew_java_packages_for_host | length > 0
