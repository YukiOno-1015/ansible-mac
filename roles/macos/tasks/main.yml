---
- name: Show hidden files in Finder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: "{{ macos_show_hidden_files }}"

- name: Show all filename extensions in Finder
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: "{{ macos_show_all_filename_extensions }}"

- name: Disable auto-correct
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticSpellingCorrectionEnabled
    type: bool
    value: "{{ macos_disable_auto_correct | bool | ternary(false, true) }}"

- name: Set key repeat rate
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: "{{ macos_key_repeat_rate }}"

- name: Set key repeat delay
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: "{{ macos_key_repeat_delay }}"

- name: Set Dock to autohide
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: "{{ macos_dock_autohide }}"

- name: Set Dock icon size
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: int
    value: "{{ macos_dock_icon_size }}"

- name: Create screenshots directory
  ansible.builtin.file:
    path: "{{ macos_screenshots_dir }}"
    state: directory
    mode: "0755"

- name: Set screenshot save location
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: location
    type: string
    value: "{{ macos_screenshots_dir }}"

- name: Get Mac hardware model
  ansible.builtin.command: sysctl -n hw.model
  register: macos_hw_model_result
  changed_when: false
  when: macos_hostname_manage

- name: Get Mac serial number
  ansible.builtin.shell: >
    ioreg -rd1 -c IOPlatformExpertDevice
    | awk -F '"' '/IOPlatformSerialNumber/ { print $4; exit }'
  register: macos_serial_result
  changed_when: false
  when: macos_hostname_manage

- name: Detect Mac device name
  ansible.builtin.set_fact:
    macos_detected_device_name: >-
      {{
        macos_hostname_device_name if (macos_hostname_device_name | length > 0)
        else 'macmini' if (macos_hw_model_result.stdout | lower).startswith('macmini')
        else 'macbook' if (macos_hw_model_result.stdout | lower).startswith('macbook')
        else 'imac' if (macos_hw_model_result.stdout | lower).startswith('imac')
        else 'macstudio' if (macos_hw_model_result.stdout | lower).startswith('macstudio')
        else 'macpro' if (macos_hw_model_result.stdout | lower).startswith('macpro')
        else 'mac'
      }}
  when: macos_hostname_manage

- name: Build Mac host name
  ansible.builtin.set_fact:
    macos_generated_host_name: >-
      {{
        [
          macos_detected_device_name,
          macos_hostname_purpose,
          (macos_serial_result.stdout | trim | lower)[
            (macos_serial_result.stdout | trim | length) - (macos_hostname_serial_suffix_length | int):
          ]
        ]
        | reject('equalto', '')
        | join('-')
        | lower
        | regex_replace('[^a-z0-9-]', '-')
        | regex_replace('-+', '-')
        | regex_replace('^-|-$', '')
      }}
  when: macos_hostname_manage

- name: Get current Mac host names
  ansible.builtin.command: "scutil --get {{ item }}"
  loop:
    - ComputerName
    - HostName
    - LocalHostName
  register: macos_current_host_names
  changed_when: false
  failed_when: false
  when: macos_hostname_manage

- name: Set Mac host names
  ansible.builtin.command: "scutil --set {{ item.item }} {{ macos_generated_host_name }}"
  loop: "{{ macos_current_host_names.results }}"
  changed_when: item.stdout != macos_generated_host_name
  when:
    - macos_hostname_manage
    - item.stdout != macos_generated_host_name

- name: Restart Finder
  ansible.builtin.command: killall Finder
  ignore_errors: true
  changed_when: false

- name: Restart Dock
  ansible.builtin.command: killall Dock
  ignore_errors: true
  changed_when: false
