---
- name: Check Xcode app is installed
  ansible.builtin.stat:
    path: /Applications/Xcode.app
  register: xcode_app

- name: Install Xcode dependent Homebrew packages
  community.general.homebrew:
    name: "{{ xcode_homebrew_packages }}"
    state: present
    update_homebrew: true
  when:
    - xcode_app.stat.exists
    - xcode_homebrew_packages | length > 0
